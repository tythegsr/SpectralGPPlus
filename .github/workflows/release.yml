name: Release on Merge to Main

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Latest Tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"
          echo "tag=$latest_tag" >> $GITHUB_ENV

      - name: Extract Version from pyproject.toml
        id: get_pyproject_version
        run: |
          new_version=$(grep '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "Detected version: $new_version"
          echo "new_version=$new_version" >> $GITHUB_ENV

      - name: Compare Versions
        id: check_version
        run: |
          latest_version="${{ env.tag }}"
          new_version="v${{ env.new_version }}"
          if [ "$new_version" \> "$latest_version" ]; then
            echo "New version is higher, proceeding with release."
            echo "should_release=true" >> $GITHUB_ENV
          else
            echo "Version in pyproject.toml is not higher than the latest tag. Skipping release."
            echo "should_release=false" >> $GITHUB_ENV

      - name: Create Git Tag
        if: env.should_release == 'true'
        run: |
          git tag "v${{ env.new_version }}"
          git push origin "v${{ env.new_version }}"

      - name: Create GitHub Release
        if: env.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.new_version }}"
          name: "Release v${{ env.new_version }}"
          body: "Automated release of v${{ env.new_version }}"
          draft: false
          prerelease: false
