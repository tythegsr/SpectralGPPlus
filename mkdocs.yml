site_name: GPPlus

theme:
  name: material
  features:
    - navigation.sections  # Sections are included in the navigation on the left.
    - toc.integrate # Table of contents integrated to the left
    - header.autohide # Hide header on scrolling
  palette:
    - media: "(prefers-color-scheme: light)" # get system preference
      primary: black
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)" # get system preference
      primary: black
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github  # GitHub logo in top right
  logo: imgs/favicon.png
  favicon: "imgs/favicon.png"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Bostanabad-Research-Group

markdown_extensions:
  - toc:
      permalink: "¤"  # Adds a clickable permalink to each section heading
      toc_depth: 4

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          #docstring_style: "google"  # or "numpy" or "sphinx"
          options:
            docstring_style: "google"
            inherited_members: true  # Allow looking up inherited methods
            show_root_heading: true  # actually display anything at all...
            show_root_full_path: true  # display "diffrax.asdf" not just "asdf"
            show_if_no_docstring: true
            show_signature_annotations: true
            show_signature: true
            separate_signature: false
            show_docstring_examples: true
            show_docstring_parameters: true
            show_docstring_attributes: true
            show_docstring_returns: true
            show_docstring_raises: true
            show_source: true  # don't include source code
            show_bases: true
            show_inheritance: true
            show_private_members: false
            show_inherited_members: false
            show_special_members: false
            members_order: source  # order methods according to their order of definition in the source code, not alphabetical order
            heading_level: 4
            show_symbol_type_heading: true
            #members: true
            #filters:
            #  - "!^__"
            #  - "!^import"
            #  - "!^_"

nav:
  - "index.md"
  - "gettingstarted.md"
  - Examples:
    - Introductory:
      - Ex1: examples/introductory/ex1.md
    - Advanced:
      - Ex2: examples/advanced/ex2.md
  - API Reference:
    - Kernels:
      - Special: reference/kernels/special.md
    - Models:
      - Base: reference/models/base.md
      - Multioutput: reference/models/multioutput.md
    - Priors: reference/priors/priors.md

repo_url: https://github.com/Bostanabad-Research-Group/GP-Plus

